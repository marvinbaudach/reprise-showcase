<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img">
  <title>L’ingénierie Reprise en un coup d’œil</title>
  <desc>Fonctions livrées, qualité imposée et feuille de route clairement structurée.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b111b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17385d"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <linearGradient id="green-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#193b36"/>
      <stop offset="1" stop-color="#112923"/>
    </linearGradient>
    <linearGradient id="violet-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302653"/>
      <stop offset="1" stop-color="#1d1937"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 15px; font-weight: 750; letter-spacing: 2.2px; }
      .hero { font-size: 45px; font-weight: 760; letter-spacing: -1px; }
      .subtitle { font-size: 19px; font-weight: 450; }
      .column-title { font-size: 24px; font-weight: 730; }
      .item-title { font-size: 18px; font-weight: 680; }
      .item { font-size: 15px; font-weight: 480; }
      .pill { font-size: 12px; font-weight: 760; letter-spacing: 1px; }
      .flow { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="28" fill="url(#background)"/>
  <rect width="1440" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="1325" cy="55" r="255" fill="#3584e4" opacity="0.07"/>
  <circle cx="60" cy="875" r="235" fill="#57e0bf" opacity="0.055"/>

  <g class="sans">
    <g transform="translate(72 58)">
      <rect x="0" y="15" width="6" height="14" rx="3" fill="#33c9a3"/>
      <rect x="10" y="6" width="6" height="30" rx="3" fill="#33c9a3"/>
      <rect x="20" y="0" width="6" height="42" rx="3" fill="#33c9a3"/>
      <rect x="30" y="10" width="6" height="22" rx="3" fill="#33c9a3"/>
      <rect x="40" y="4" width="6" height="34" rx="3" fill="#33c9a3"/>
    </g>
    <text x="136" y="75" class="eyebrow" fill="#8fbff5">REPRISE · L’INGÉNIERIE EN UN COUP D’ŒIL</text>
    <text x="136" y="98" class="item" fill="#94a3b8">PRODUIT · QUALITÉ · DIRECTION</text>

    <text x="72" y="164" class="hero" fill="#f8fafc">Un vrai produit musical. Conçu comme tel.</text>
    <text x="72" y="198" class="subtitle" fill="#aab6c8">UX native, fondations Rust portables et preuves à chaque niveau.</text>

    <!-- Shipped product -->
    <g filter="url(#shadow)">
      <rect x="72" y="242" width="408" height="430" rx="22" fill="url(#blue-card)" stroke="#62a0ea" stroke-width="2"/>
    </g>
    <rect x="100" y="270" width="84" height="27" rx="13.5" fill="#57e0bf" fill-opacity="0.16" stroke="#57e0bf" stroke-opacity="0.5"/>
    <text x="142" y="288" class="pill" text-anchor="middle" fill="#74f0d0">LIVRÉ</text>
    <text x="100" y="332" class="column-title" fill="#f8fafc">Profondeur du produit</text>

    <circle cx="111" cy="371" r="6" fill="#62a0ea"/>
    <text x="132" y="377" class="item-title" fill="#e6f1ff">Lecteur GNOME natif</text>
    <text x="132" y="401" class="item" fill="#b8c6d8">Bibliothèque · lecture · métadonnées · paroles</text>

    <circle cx="111" cy="442" r="6" fill="#62a0ea"/>
    <text x="132" y="448" class="item-title" fill="#e6f1ff">Synchronisation Android / MTP</text>
    <text x="132" y="472" class="item" fill="#b8c6d8">Plan delta · progression · annulation</text>

    <circle cx="111" cy="513" r="6" fill="#62a0ea"/>
    <text x="132" y="519" class="item-title" fill="#e6f1ff">Santé de la bibliothèque</text>
    <text x="132" y="543" class="item" fill="#b8c6d8">Morceaux absents + déplacés · nettoyage sûr</text>

    <circle cx="111" cy="584" r="6" fill="#62a0ea"/>
    <text x="132" y="590" class="item-title" fill="#e6f1ff">Performance mesurée</text>
    <text x="132" y="614" class="item" fill="#b8c6d8">Profilage · cache · index · preuves SQL</text>

    <!-- Engineering confidence -->
    <g filter="url(#shadow)">
      <rect x="516" y="242" width="408" height="430" rx="22" fill="url(#green-card)" stroke="#57e0bf" stroke-width="2"/>
    </g>
    <rect x="544" y="270" width="112" height="27" rx="13.5" fill="#57e0bf" fill-opacity="0.16" stroke="#57e0bf" stroke-opacity="0.5"/>
    <text x="600" y="288" class="pill" text-anchor="middle" fill="#74f0d0">IMPOSÉ</text>
    <text x="544" y="332" class="column-title" fill="#f8fafc">Confiance d’ingénierie</text>

    <circle cx="555" cy="371" r="6" fill="#57e0bf"/>
    <text x="576" y="377" class="item-title" fill="#e5fff8">Développement piloté par les tests</text>
    <text x="576" y="401" class="item" fill="#c4dfd8">Rouge → vert · cœur pur · contrôles stricts</text>

    <circle cx="555" cy="442" r="6" fill="#57e0bf"/>
    <text x="576" y="448" class="item-title" fill="#e5fff8">Accessibilité contractuelle</text>
    <text x="576" y="472" class="item" fill="#c4dfd8">Clavier · focus · sémantique · CUA/AT-SPI</text>

    <circle cx="555" cy="513" r="6" fill="#57e0bf"/>
    <text x="576" y="519" class="item-title" fill="#e5fff8">Règlement UX + animations</text>
    <text x="576" y="543" class="item" fill="#c4dfd8">Chaque règle active possède un test nommé</text>

    <circle cx="555" cy="584" r="6" fill="#57e0bf"/>
    <text x="576" y="590" class="item-title" fill="#e5fff8">Délais de réponse visible</text>
    <text x="576" y="614" class="item" fill="#c4dfd8">Objectif &lt;100 ms · interactions chronométrées</text>

    <!-- Roadmap -->
    <g filter="url(#shadow)">
      <rect x="960" y="242" width="408" height="430" rx="22" fill="url(#violet-card)" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <rect x="988" y="270" width="128" height="27" rx="13.5" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="1052" y="288" class="pill" text-anchor="middle" fill="#c4b5fd">PROCHAINS HORIZONS</text>
    <text x="988" y="332" class="column-title" fill="#f8fafc">Une ambition claire et structurée</text>

    <text x="988" y="372" class="pill" fill="#74f0d0">EN DÉVELOPPEMENT</text>
    <text x="988" y="401" class="item-title" fill="#f0ebff">Analyse audio → effets visuels</text>

    <text x="988" y="443" class="pill" fill="#8fbff5">ARCHITECTURE SUIVANTE</text>
    <text x="988" y="472" class="item-title" fill="#f0ebff">Une couche Rust pour MCP + CLI</text>

    <text x="988" y="514" class="pill" fill="#f8c66a">LIVRAISON PLANIFIÉE</text>
    <text x="988" y="543" class="item-title" fill="#f0ebff">Prévisualisation isolée par PR</text>

    <text x="988" y="585" class="pill" fill="#c4b5fd">EXPLORATOIRE</text>
    <text x="988" y="614" class="item-title" fill="#f0ebff">Visuels IA · instrumentaux · remixes</text>
    <text x="988" y="638" class="item" fill="#c9c0df">Génération musicale + changement de genre</text>

    <!-- Delivery flow -->
    <rect x="72" y="714" width="1296" height="126" rx="20" fill="#0e1623" stroke="#334155"/>
    <text x="100" y="748" class="eyebrow" fill="#94a3b8">LIVRAISON CONTRÔLÉE</text>

    <rect x="100" y="771" width="190" height="42" rx="12" fill="#1b2b41" stroke="#62a0ea"/>
    <text x="195" y="797" class="flow mono" text-anchor="middle" fill="#dbeafe">branches de fonctionnalité</text>
    <path d="M290 792H358" stroke="#526176" stroke-width="2"/>
    <path d="M350 786l10 6-10 6" fill="none" stroke="#526176" stroke-width="2"/>

    <rect x="360" y="771" width="190" height="42" rx="12" fill="#173129" stroke="#57e0bf"/>
    <text x="455" y="797" class="flow" text-anchor="middle" fill="#dffcf4">contrôles PR + revue</text>
    <path d="M550 792H618" stroke="#526176" stroke-width="2"/>
    <path d="M610 786l10 6-10 6" fill="none" stroke="#526176" stroke-width="2"/>

    <rect x="620" y="771" width="150" height="42" rx="12" fill="#28203f" stroke="#a78bfa"/>
    <text x="695" y="797" class="flow mono" text-anchor="middle" fill="#eee9ff">dev</text>
    <path d="M770 792H838" stroke="#526176" stroke-width="2"/>
    <path d="M830 786l10 6-10 6" fill="none" stroke="#526176" stroke-width="2"/>

    <rect x="840" y="771" width="150" height="42" rx="12" fill="#173129" stroke="#57e0bf"/>
    <text x="915" y="797" class="flow mono" text-anchor="middle" fill="#dffcf4">main</text>

    <rect x="1030" y="771" width="310" height="42" rx="12" fill="#2b2518" stroke="#f8c66a" stroke-dasharray="6 5"/>
    <text x="1185" y="797" class="flow" text-anchor="middle" fill="#f8d993">prévisualisations PR · prévues</text>
  </g>
</svg>
