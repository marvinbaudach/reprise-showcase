<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title description">
  <title id="title">Was der Reprise-Titelindex bei 100.000 Tracks verändert</title>
  <desc id="description">Ein Same-Host-Release-Vergleich verbindet eine Datenbankoptimierung mit zwei gemessenen Effekten. Ein partieller Case-insensitiver Index für vorhandene Tracks ersetzt Full Scan und temporäre Sortierung. Das letzte Titelfenster mit 200 Zeilen fällt von 53,605 auf 1,333 Millisekunden und ist 40,2-mal schneller; die Playback-ID-Projektion fällt von 8,125 auf 0,298 Millisekunden. Der Index kostet 9,85 Prozent mehr Datenbankspeicher.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b111b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="before" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252e3b"/>
      <stop offset="1" stop-color="#171e28"/>
    </linearGradient>
    <linearGradient id="change" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17385d"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <linearGradient id="after" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#193b36"/>
      <stop offset="1" stop-color="#10271f"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#57e0bf"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 2.4px; }
      .title { font-size: 48px; font-weight: 750; letter-spacing: -1.2px; }
      .subtitle { font-size: 20px; font-weight: 450; }
      .number { font-size: 48px; font-weight: 800; letter-spacing: -1.1px; }
      .impact { font-size: 32px; font-weight: 780; letter-spacing: -0.6px; }
      .card-title { font-size: 18px; font-weight: 700; }
      .body { font-size: 17px; font-weight: 450; }
      .small { font-size: 14px; font-weight: 600; }
      .pill { font-size: 13px; font-weight: 700; letter-spacing: 0.7px; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="28" fill="url(#background)"/>
  <rect width="1440" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="1320" cy="65" r="260" fill="#3584e4" opacity="0.07"/>
  <circle cx="75" cy="845" r="240" fill="#2ec7a6" opacity="0.055"/>

  <g class="sans">
    <g transform="translate(76 64)">
      <rect width="48" height="48" rx="13" fill="#3584e4"/>
      <circle cx="24" cy="24" r="15" fill="#241f31"/>
      <circle cx="24" cy="24" r="5" fill="#ff7800"/>
      <circle cx="24" cy="24" r="1.8" fill="#f6f5f4"/>
      <path d="M11 20a15 15 0 0 1 23-8l-3 1 1-4 2 2A19 19 0 0 0 9 19z" fill="#f6f5f4"/>
      <path d="M37 28a15 15 0 0 1-23 8l3-1-1 4-2-2a19 19 0 0 0 25-8z" fill="#f6f5f4"/>
    </g>
    <text x="142" y="84" class="eyebrow" fill="#8fbff5">REPRISE</text>
    <text x="142" y="108" class="small" fill="#94a3b8">AKZEPTIERTE PERFORMANCE-EVIDENZ</text>

    <text x="76" y="174" class="title" fill="#f8fafc">Ein Index, zwei gemessene Effekte.</text>
    <text x="76" y="208" class="subtitle" fill="#aab6c8">Gleicher Host + Release-Build · generierte Datenbank mit 100.000 Tracks · identische Last</text>

    <!-- Before -->
    <g filter="url(#shadow)">
      <rect x="76" y="272" width="364" height="300" rx="22" fill="url(#before)" stroke="#526176" stroke-width="1.5"/>
    </g>
    <rect x="106" y="302" width="90" height="28" rx="14" fill="#94a3b8" fill-opacity="0.13" stroke="#94a3b8" stroke-opacity="0.4"/>
    <text x="151" y="321" class="pill" text-anchor="middle" fill="#c2cad5">VORHER</text>
    <text x="106" y="385" class="number" fill="#f8fafc">53,605 ms</text>
    <text x="106" y="416" class="body" fill="#cbd5e1">letztes Titelfenster mit 200 Zeilen</text>
    <rect x="106" y="452" width="304" height="76" rx="12" fill="#0d1521"/>
    <text x="126" y="478" class="small" fill="#94a3b8">QUERY-PLAN</text>
    <text x="126" y="505" class="body mono" fill="#d5dbe4">Full Scan + temporäre Sortierung</text>
    <text x="106" y="550" class="small" fill="#94a3b8">Sortiert jede tiefe Seite neu</text>

    <!-- Optimization -->
    <g filter="url(#shadow)">
      <rect x="538" y="242" width="364" height="360" rx="22" fill="url(#change)" stroke="#62a0ea" stroke-width="2"/>
    </g>
    <rect x="568" y="272" width="138" height="28" rx="14" fill="#62a0ea" fill-opacity="0.15" stroke="#62a0ea" stroke-opacity="0.48"/>
    <text x="637" y="291" class="pill" text-anchor="middle" fill="#9bc8f7">ÄNDERUNG</text>
    <text x="568" y="347" class="card-title" fill="#f8fafc">partieller NOCASE-Index</text>
    <rect x="568" y="370" width="304" height="112" rx="12" fill="#0d1521"/>
    <text x="588" y="401" class="body mono" fill="#dbeafe">title COLLATE NOCASE</text>
    <text x="588" y="431" class="body mono" fill="#aebdd0">WHERE missing_since IS NULL</text>
    <text x="588" y="461" class="body mono" fill="#aebdd0">  AND removed_at IS NULL</text>
    <text x="568" y="520" class="card-title" fill="#f1c887">Trade-off: +9,85 % Speicher</text>
    <text x="568" y="554" class="body" fill="#b8c6d8">+2,38 MB für schnellere Reads</text>

    <!-- After -->
    <g filter="url(#shadow)">
      <rect x="1000" y="272" width="364" height="300" rx="22" fill="url(#after)" stroke="#57e0bf" stroke-width="2.5"/>
    </g>
    <rect x="1030" y="302" width="82" height="28" rx="14" fill="#57e0bf" fill-opacity="0.15" stroke="#57e0bf" stroke-opacity="0.5"/>
    <text x="1071" y="321" class="pill" text-anchor="middle" fill="#74f0d0">NACHHER</text>
    <text x="1030" y="385" class="number" fill="#74f0d0">1,333 ms</text>
    <text x="1030" y="416" class="body" fill="#d2f5eb">letztes Titelfenster mit 200 Zeilen</text>
    <rect x="1030" y="452" width="304" height="76" rx="12" fill="#0c211c" stroke="#57e0bf" stroke-opacity="0.3"/>
    <text x="1050" y="478" class="small" fill="#74f0d0">QUERY-PLAN</text>
    <text x="1050" y="505" class="body mono" fill="#d2f5eb">Index-Scan · kein Sort</text>
    <text x="1030" y="550" class="card-title" fill="#74f0d0">40,2× schneller · −97,51 %</text>

    <!-- Causal arrows -->
    <path d="M440 421H518" fill="none" stroke="#57e0bf" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M902 421H980" fill="none" stroke="#57e0bf" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Measured effects -->
    <g filter="url(#shadow)">
      <rect x="76" y="640" width="1288" height="150" rx="20" fill="#151d2a" stroke="#35445a"/>
    </g>
    <text x="108" y="680" class="eyebrow" fill="#8fbff5">EINE DATENBANKÄNDERUNG · ZWEI LESEPFADE</text>

    <text x="108" y="728" class="card-title" fill="#f8fafc">Letztes sortiertes Fenster</text>
    <text x="108" y="762" class="body mono" fill="#aebdd0">53,605 ms</text>
    <path d="M232 755H284" fill="none" stroke="#57e0bf" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="302" y="762" class="body mono" fill="#74f0d0">1,333 ms</text>
    <text x="426" y="762" class="impact" fill="#74f0d0">−97,51 %</text>

    <line x1="718" y1="698" x2="718" y2="770" stroke="#35445a" stroke-width="1.5"/>

    <text x="758" y="728" class="card-title" fill="#f8fafc">Playback-ID-Projektion</text>
    <text x="758" y="762" class="body mono" fill="#aebdd0">8,125 ms</text>
    <path d="M870 755H922" fill="none" stroke="#57e0bf" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="940" y="762" class="body mono" fill="#74f0d0">0,298 ms</text>
    <text x="1064" y="762" class="impact" fill="#74f0d0">−96,33 %</text>

    <!-- Method footer -->
    <g transform="translate(76 832)">
      <circle cx="9" cy="8" r="7" fill="#57e0bf" opacity="0.18"/>
      <path d="M5 8l3 3 6-7" fill="none" stroke="#74f0d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="28" y="14" class="small" fill="#aebccf">Guardrails unverändert: ≤8 SQL-Fenster · ≤1.600 Zeilen · synthetische Metadaten · Laufzeiten nicht portabel.</text>
    </g>
  </g>
</svg>
