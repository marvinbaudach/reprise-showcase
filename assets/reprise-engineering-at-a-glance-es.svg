<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img">
  <title>Ingeniería Reprise de un vistazo</title>
  <desc>Funciones disponibles, calidad obligatoria y roadmap claramente estructurada.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b111b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17385d"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <linearGradient id="green-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#193b36"/>
      <stop offset="1" stop-color="#112923"/>
    </linearGradient>
    <linearGradient id="violet-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302653"/>
      <stop offset="1" stop-color="#1d1937"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 15px; font-weight: 750; letter-spacing: 2.2px; }
      .hero { font-size: 45px; font-weight: 760; letter-spacing: -1px; }
      .subtitle { font-size: 19px; font-weight: 450; }
      .column-title { font-size: 24px; font-weight: 730; }
      .item-title { font-size: 18px; font-weight: 680; }
      .item { font-size: 15px; font-weight: 480; }
      .pill { font-size: 12px; font-weight: 760; letter-spacing: 1px; }
      .flow { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="28" fill="url(#background)"/>
  <rect width="1440" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="1325" cy="55" r="255" fill="#3584e4" opacity="0.07"/>
  <circle cx="60" cy="875" r="235" fill="#57e0bf" opacity="0.055"/>

  <g class="sans">
    <g transform="translate(72 56)">
      <rect width="46" height="46" rx="13" fill="#3584e4"/>
      <circle cx="23" cy="23" r="14" fill="#241f31"/>
      <circle cx="23" cy="23" r="5" fill="#ff7800"/>
      <circle cx="23" cy="23" r="1.7" fill="#f6f5f4"/>
      <path d="M11 19a14 14 0 0 1 22-7l-3 1 1-4 2 2A18 18 0 0 0 9 19z" fill="#f6f5f4"/>
      <path d="M35 27a14 14 0 0 1-22 7l3-1-1 4-2-2a18 18 0 0 0 24-8z" fill="#f6f5f4"/>
    </g>
    <text x="136" y="75" class="eyebrow" fill="#8fbff5">REPRISE · INGENIERÍA DE UN VISTAZO</text>
    <text x="136" y="98" class="item" fill="#94a3b8">PRODUCTO · CALIDAD · DIRECCIÓN</text>

    <text x="72" y="164" class="hero" fill="#f8fafc">Un producto musical serio. Construido como tal.</text>
    <text x="72" y="198" class="subtitle" fill="#aab6c8">UX nativa, base Rust portable y evidencia en cada nivel.</text>

    <!-- Shipped product -->
    <g filter="url(#shadow)">
      <rect x="72" y="242" width="408" height="430" rx="22" fill="url(#blue-card)" stroke="#62a0ea" stroke-width="2"/>
    </g>
    <rect x="100" y="270" width="84" height="27" rx="13.5" fill="#57e0bf" fill-opacity="0.16" stroke="#57e0bf" stroke-opacity="0.5"/>
    <text x="142" y="288" class="pill" text-anchor="middle" fill="#74f0d0">DISPONIBLE</text>
    <text x="100" y="332" class="column-title" fill="#f8fafc">Profundidad de producto</text>

    <circle cx="111" cy="371" r="6" fill="#62a0ea"/>
    <text x="132" y="377" class="item-title" fill="#e6f1ff">Reproductor GNOME nativo</text>
    <text x="132" y="401" class="item" fill="#b8c6d8">Biblioteca · audio · metadatos · letras</text>

    <circle cx="111" cy="442" r="6" fill="#62a0ea"/>
    <text x="132" y="448" class="item-title" fill="#e6f1ff">Sincronización Android / MTP</text>
    <text x="132" y="472" class="item" fill="#b8c6d8">Plan delta · progreso · cancelación</text>

    <circle cx="111" cy="513" r="6" fill="#62a0ea"/>
    <text x="132" y="519" class="item-title" fill="#e6f1ff">Salud de la biblioteca</text>
    <text x="132" y="543" class="item" fill="#b8c6d8">Pistas ausentes + movidas · limpieza segura</text>

    <circle cx="111" cy="584" r="6" fill="#62a0ea"/>
    <text x="132" y="590" class="item-title" fill="#e6f1ff">Rendimiento medido</text>
    <text x="132" y="614" class="item" fill="#b8c6d8">Profiling · caché · índices · evidencia SQL</text>

    <!-- Engineering confidence -->
    <g filter="url(#shadow)">
      <rect x="516" y="242" width="408" height="430" rx="22" fill="url(#green-card)" stroke="#57e0bf" stroke-width="2"/>
    </g>
    <rect x="544" y="270" width="112" height="27" rx="13.5" fill="#57e0bf" fill-opacity="0.16" stroke="#57e0bf" stroke-opacity="0.5"/>
    <text x="600" y="288" class="pill" text-anchor="middle" fill="#74f0d0">OBLIGATORIO</text>
    <text x="544" y="332" class="column-title" fill="#f8fafc">Confianza de ingeniería</text>

    <circle cx="555" cy="371" r="6" fill="#57e0bf"/>
    <text x="576" y="377" class="item-title" fill="#e5fff8">Desarrollo guiado por tests</text>
    <text x="576" y="401" class="item" fill="#c4dfd8">Rojo → verde · core puro · gates estrictos</text>

    <circle cx="555" cy="442" r="6" fill="#57e0bf"/>
    <text x="576" y="448" class="item-title" fill="#e5fff8">Accesibilidad como contrato</text>
    <text x="576" y="472" class="item" fill="#c4dfd8">Teclado · foco · semántica · CUA/AT-SPI</text>

    <circle cx="555" cy="513" r="6" fill="#57e0bf"/>
    <text x="576" y="519" class="item-title" fill="#e5fff8">Reglas UX + movimiento</text>
    <text x="576" y="543" class="item" fill="#c4dfd8">Cada regla activa tiene un test propio</text>

    <circle cx="555" cy="584" r="6" fill="#57e0bf"/>
    <text x="576" y="590" class="item-title" fill="#e5fff8">Límites de respuesta visible</text>
    <text x="576" y="614" class="item" fill="#c4dfd8">Objetivo &lt;100 ms · interacciones cronometradas</text>

    <!-- Roadmap -->
    <g filter="url(#shadow)">
      <rect x="960" y="242" width="408" height="430" rx="22" fill="url(#violet-card)" stroke="#a78bfa" stroke-width="2"/>
    </g>
    <rect x="988" y="270" width="128" height="27" rx="13.5" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="1052" y="288" class="pill" text-anchor="middle" fill="#c4b5fd">PRÓXIMOS HORIZONTES</text>
    <text x="988" y="332" class="column-title" fill="#f8fafc">Ambición clara y gradual</text>

    <text x="988" y="372" class="pill" fill="#74f0d0">EN DESARROLLO</text>
    <text x="988" y="401" class="item-title" fill="#f0ebff">Análisis de audio → efectos visuales</text>

    <text x="988" y="443" class="pill" fill="#8fbff5">PRÓXIMA ARQUITECTURA</text>
    <text x="988" y="472" class="item-title" fill="#f0ebff">Una capa Rust para MCP + CLI</text>

    <text x="988" y="514" class="pill" fill="#f8c66a">DELIVERY PLANIFICADA</text>
    <text x="988" y="543" class="item-title" fill="#f0ebff">Preview aislada para cada PR</text>

    <text x="988" y="585" class="pill" fill="#c4b5fd">EXPLORACIÓN</text>
    <text x="988" y="614" class="item-title" fill="#f0ebff">Visuales IA · instrumentales · remixes</text>
    <text x="988" y="638" class="item" fill="#c9c0df">Generación musical + cambio de género</text>

    <!-- Delivery flow -->
    <rect x="72" y="714" width="1296" height="126" rx="20" fill="#0e1623" stroke="#334155"/>
    <text x="100" y="748" class="eyebrow" fill="#94a3b8">DELIVERY CONTROLADA</text>

    <rect x="100" y="771" width="190" height="42" rx="12" fill="#1b2b41" stroke="#62a0ea"/>
    <text x="195" y="797" class="flow mono" text-anchor="middle" fill="#dbeafe">branches de funcionalidad</text>
    <path d="M290 792H358" stroke="#526176" stroke-width="2"/>
    <path d="M350 786l10 6-10 6" fill="none" stroke="#526176" stroke-width="2"/>

    <rect x="360" y="771" width="190" height="42" rx="12" fill="#173129" stroke="#57e0bf"/>
    <text x="455" y="797" class="flow" text-anchor="middle" fill="#dffcf4">gates de PR + revisión</text>
    <path d="M550 792H618" stroke="#526176" stroke-width="2"/>
    <path d="M610 786l10 6-10 6" fill="none" stroke="#526176" stroke-width="2"/>

    <rect x="620" y="771" width="150" height="42" rx="12" fill="#28203f" stroke="#a78bfa"/>
    <text x="695" y="797" class="flow mono" text-anchor="middle" fill="#eee9ff">dev</text>
    <path d="M770 792H838" stroke="#526176" stroke-width="2"/>
    <path d="M830 786l10 6-10 6" fill="none" stroke="#526176" stroke-width="2"/>

    <rect x="840" y="771" width="150" height="42" rx="12" fill="#173129" stroke="#57e0bf"/>
    <text x="915" y="797" class="flow mono" text-anchor="middle" fill="#dffcf4">main</text>

    <rect x="1030" y="771" width="310" height="42" rx="12" fill="#2b2518" stroke="#f8c66a" stroke-dasharray="6 5"/>
    <text x="1185" y="797" class="flow" text-anchor="middle" fill="#f8d993">previews de PR · planificadas</text>
  </g>
</svg>
