<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title description">
  <title id="title">Architettura Reprise a tre crate</title>
  <desc id="description">Il frontend GTK e libadwaita disponibile usa il core portabile di Reprise e l’adattatore Linux. I futuri frontend nativi riutilizzano il core tramite contratti ristretti. L’adattatore Linux implementa le interfacce di riproduzione, integrazione multimediale e dispositivi definite dal core.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b111b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gnome-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17385d"/>
      <stop offset="1" stop-color="#10233c"/>
    </linearGradient>
    <linearGradient id="core-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#193b36"/>
      <stop offset="1" stop-color="#112923"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#62a0ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#57e0bf"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 2.4px; }
      .title { font-size: 48px; font-weight: 750; letter-spacing: -1.2px; }
      .subtitle { font-size: 20px; font-weight: 450; }
      .crate { font-size: 27px; font-weight: 700; }
      .card-title { font-size: 18px; font-weight: 650; }
      .body { font-size: 17px; font-weight: 450; }
      .small { font-size: 14px; font-weight: 600; }
      .pill { font-size: 13px; font-weight: 700; letter-spacing: 0.8px; }
      .line-label { font-size: 13px; font-weight: 650; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="28" fill="url(#background)"/>
  <rect width="1440" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="1320" cy="65" r="260" fill="#3584e4" opacity="0.07"/>
  <circle cx="75" cy="845" r="240" fill="#2ec7a6" opacity="0.055"/>

  <g class="sans">
    <g transform="translate(76 64)">
      <rect width="48" height="48" rx="13" fill="#3584e4"/>
      <circle cx="24" cy="24" r="15" fill="#241f31"/>
      <circle cx="24" cy="24" r="5" fill="#ff7800"/>
      <circle cx="24" cy="24" r="1.8" fill="#f6f5f4"/>
      <path d="M11 20a15 15 0 0 1 23-8l-3 1 1-4 2 2A19 19 0 0 0 9 19z" fill="#f6f5f4"/>
      <path d="M37 28a15 15 0 0 1-23 8l3-1-1 4-2-2a19 19 0 0 0 25-8z" fill="#f6f5f4"/>
    </g>
    <text x="142" y="84" class="eyebrow" fill="#8fbff5">REPRISE</text>
    <text x="142" y="108" class="small" fill="#94a3b8">WORKSPACE A TRE CRATE</text>

    <text x="76" y="174" class="title" fill="#f8fafc">Nativo dove conta.</text>
    <text x="76" y="208" class="subtitle" fill="#aab6c8">Un motore musicale portabile dietro confini frontend e piattaforma espliciti.</text>

    <!-- Frontend cards -->
    <g filter="url(#shadow)">
      <rect x="76" y="264" width="600" height="182" rx="22" fill="url(#gnome-card)" stroke="#62a0ea" stroke-width="2"/>
      <rect x="764" y="264" width="600" height="182" rx="22" fill="#151d2a" stroke="#526176" stroke-width="1.5" stroke-dasharray="8 7"/>
    </g>

    <rect x="108" y="292" width="86" height="28" rx="14" fill="#57e0bf" fill-opacity="0.16" stroke="#57e0bf" stroke-opacity="0.48"/>
    <text x="151" y="311" class="pill" text-anchor="middle" fill="#74f0d0">DISPONIBILE</text>
    <text x="108" y="357" class="crate mono" fill="#f8fafc">reprise-gnome</text>
    <text x="108" y="389" class="card-title" fill="#dbeafe">Frontend GNOME nativo</text>
    <text x="108" y="419" class="body" fill="#aebdd0">GTK4 · libadwaita · interazione e presentazione</text>

    <rect x="796" y="292" width="84" height="28" rx="14" fill="#94a3b8" fill-opacity="0.12" stroke="#94a3b8" stroke-opacity="0.36"/>
    <text x="838" y="311" class="pill" text-anchor="middle" fill="#aeb8c7">PIANIFICATO</text>
    <text x="796" y="357" class="crate" fill="#e2e8f0">Futuri frontend nativi</text>
    <text x="796" y="389" class="card-title" fill="#cbd5e1">Prodotti distinti, motore condiviso</text>
    <text x="796" y="419" class="body" fill="#94a3b8">macOS · Windows · mobile</text>

    <!-- Dependency connectors -->
    <path d="M240 446V518" fill="none" stroke="#62a0ea" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M528 446C528 493 906 478 906 518" fill="none" stroke="#62a0ea" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M1064 446V518" fill="none" stroke="#73839a" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow-blue)" opacity="0.8"/>

    <g>
      <rect x="197" y="469" width="86" height="28" rx="14" fill="#0d1521" stroke="#294667"/>
      <text x="240" y="488" class="line-label" text-anchor="middle" fill="#8fbff5">USA</text>
      <rect x="859" y="469" width="94" height="28" rx="14" fill="#0d1521" stroke="#294667"/>
      <text x="906" y="488" class="line-label" text-anchor="middle" fill="#8fbff5">RIUSA</text>
    </g>

    <!-- Engine and adapter cards -->
    <g filter="url(#shadow)">
      <rect x="76" y="536" width="600" height="248" rx="22" fill="#171e28" stroke="#62a0ea" stroke-width="1.5"/>
      <rect x="764" y="536" width="600" height="248" rx="22" fill="url(#core-card)" stroke="#57e0bf" stroke-width="2.5"/>
    </g>

    <rect x="108" y="564" width="126" height="28" rx="14" fill="#62a0ea" fill-opacity="0.13" stroke="#62a0ea" stroke-opacity="0.42"/>
    <text x="171" y="583" class="pill" text-anchor="middle" fill="#8fbff5">ADATTATORE LINUX</text>
    <text x="108" y="630" class="crate mono" fill="#f8fafc">reprise-platform-linux</text>
    <text x="108" y="666" class="body" fill="#b8c6d8">Riproduzione GStreamer · MPRIS / D-Bus</text>
    <text x="108" y="695" class="body" fill="#b8c6d8">Dispositivi MTP · Cestino e integrazione host</text>
    <rect x="108" y="728" width="460" height="32" rx="10" fill="#0d1521"/>
    <text x="125" y="750" class="small" fill="#8fbff5">implementa i contratti di reprise-core</text>

    <rect x="796" y="564" width="128" height="28" rx="14" fill="#57e0bf" fill-opacity="0.14" stroke="#57e0bf" stroke-opacity="0.46"/>
    <text x="860" y="583" class="pill" text-anchor="middle" fill="#74f0d0">MOTORE PORTABILE</text>
    <text x="796" y="630" class="crate mono" fill="#f8fafc">reprise-core</text>
    <text x="796" y="667" class="body" fill="#c9e7df">Libreria + SQLite · coda + playlist</text>
    <text x="796" y="696" class="body" fill="#c9e7df">Scansione + cover · impostazioni + sincronizzazione</text>
    <text x="796" y="725" class="body" fill="#c9e7df">Moduli opzionali · contratti playback e media</text>
    <rect x="796" y="744" width="522" height="24" rx="8" fill="#57e0bf" fill-opacity="0.1"/>
    <text x="812" y="761" class="small" fill="#74f0d0">Senza GUI · neutro · testabile separatamente</text>

    <!-- Adapter implements the core's seams -->
    <path d="M676 660H744" fill="none" stroke="#57e0bf" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-green)"/>

    <!-- Purity footer -->
    <g transform="translate(76 824)">
      <circle cx="9" cy="8" r="7" fill="#57e0bf" opacity="0.18"/>
      <path d="M5 8l3 3 6-7" fill="none" stroke="#74f0d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="28" y="14" class="small" fill="#aebccf">Confine imposto: reprise-core non dipende da GTK, libadwaita, GStreamer o zbus.</text>
    </g>
  </g>
</svg>
