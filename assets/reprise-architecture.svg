<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title description">
  <title id="title">Where behavior lives in the Reprise three-crate workspace</title>
  <desc id="description">The GTK frontend sends commands and queries to the portable core and renders returned state. The Linux adapter implements playback, media, device, and analysis contracts owned by the core. GTK, libadwaita, GStreamer, and zbus are mechanically forbidden in the core.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b111b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#193b36"/>
      <stop offset="1" stop-color="#10271f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17385d"/>
      <stop offset="1" stop-color="#101f34"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#62a0ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#57e0bf"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 2.4px; }
      .title { font-size: 48px; font-weight: 750; letter-spacing: -1.2px; }
      .subtitle { font-size: 20px; font-weight: 450; }
      .crate { font-size: 25px; font-weight: 700; }
      .card-title { font-size: 18px; font-weight: 700; }
      .body { font-size: 17px; font-weight: 450; }
      .small { font-size: 14px; font-weight: 600; }
      .pill { font-size: 13px; font-weight: 700; letter-spacing: 0.7px; }
      .flow { font-size: 12px; font-weight: 750; letter-spacing: 0.6px; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="28" fill="url(#background)"/>
  <rect width="1440" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="1320" cy="65" r="260" fill="#3584e4" opacity="0.07"/>
  <circle cx="75" cy="845" r="240" fill="#2ec7a6" opacity="0.055"/>

  <g class="sans">
    <g transform="translate(76 64)">
      <rect width="48" height="48" rx="13" fill="#3584e4"/>
      <circle cx="24" cy="24" r="15" fill="#241f31"/>
      <circle cx="24" cy="24" r="5" fill="#ff7800"/>
      <circle cx="24" cy="24" r="1.8" fill="#f6f5f4"/>
      <path d="M11 20a15 15 0 0 1 23-8l-3 1 1-4 2 2A19 19 0 0 0 9 19z" fill="#f6f5f4"/>
      <path d="M37 28a15 15 0 0 1-23 8l3-1-1 4-2-2a19 19 0 0 0 25-8z" fill="#f6f5f4"/>
    </g>
    <text x="142" y="84" class="eyebrow" fill="#8fbff5">REPRISE</text>
    <text x="142" y="108" class="small" fill="#94a3b8">CURRENT THREE-CRATE WORKSPACE</text>

    <text x="76" y="174" class="title" fill="#f8fafc">Where behavior lives.</text>
    <text x="76" y="208" class="subtitle" fill="#aab6c8">One domain authority, with native presentation and replaceable host implementations.</text>

    <!-- Native frontend -->
    <g filter="url(#shadow)">
      <rect x="76" y="290" width="322" height="316" rx="22" fill="url(#edge)" stroke="#62a0ea" stroke-width="2"/>
    </g>
    <rect x="104" y="318" width="148" height="28" rx="14" fill="#62a0ea" fill-opacity="0.14" stroke="#62a0ea" stroke-opacity="0.48"/>
    <text x="178" y="337" class="pill" text-anchor="middle" fill="#9bc8f7">NATIVE FRONTEND</text>
    <text x="104" y="390" class="crate mono" fill="#f8fafc">reprise-gnome</text>
    <text x="104" y="430" class="card-title" fill="#dbeafe">Owns presentation</text>
    <text x="104" y="464" class="body" fill="#b8c6d8">GTK4 + libadwaita</text>
    <text x="104" y="494" class="body" fill="#b8c6d8">interaction + view state</text>
    <text x="104" y="524" class="body" fill="#b8c6d8">accessibility + desktop layout</text>
    <rect x="104" y="540" width="266" height="54" rx="9" fill="#0d1521"/>
    <text x="120" y="561" class="flow" fill="#9bc8f7">→ COMMANDS + QUERIES</text>
    <text x="120" y="582" class="flow" fill="#74f0d0">← STATE + RESULTS</text>

    <!-- Portable core -->
    <g filter="url(#shadow)">
      <rect x="458" y="250" width="524" height="396" rx="24" fill="url(#core)" stroke="#57e0bf" stroke-width="2.5"/>
    </g>
    <rect x="490" y="280" width="164" height="28" rx="14" fill="#57e0bf" fill-opacity="0.14" stroke="#57e0bf" stroke-opacity="0.5"/>
    <text x="572" y="299" class="pill" text-anchor="middle" fill="#74f0d0">DOMAIN AUTHORITY</text>
    <text x="490" y="350" class="crate mono" fill="#f8fafc">reprise-core</text>

    <rect x="490" y="380" width="460" height="50" rx="11" fill="#0c211c"/>
    <text x="510" y="411" class="card-title" fill="#d2f5eb">Library + SQLite queries</text>
    <rect x="490" y="440" width="460" height="50" rx="11" fill="#0c211c"/>
    <text x="510" y="471" class="card-title" fill="#d2f5eb">Scanner + identity reconciliation</text>
    <rect x="490" y="500" width="460" height="50" rx="11" fill="#0c211c"/>
    <text x="510" y="531" class="card-title" fill="#d2f5eb">Queue + playlists + settings</text>
    <rect x="490" y="560" width="460" height="58" rx="11" fill="#57e0bf" fill-opacity="0.1" stroke="#57e0bf" stroke-opacity="0.35"/>
    <text x="510" y="585" class="small" fill="#74f0d0">OWNS THE CONTRACTS</text>
    <text x="510" y="607" class="body" fill="#c9e7df">playback · media · device · analysis</text>

    <!-- Linux host implementations -->
    <g filter="url(#shadow)">
      <rect x="1042" y="290" width="322" height="316" rx="22" fill="#171e28" stroke="#62a0ea" stroke-width="1.8"/>
    </g>
    <rect x="1070" y="318" width="142" height="28" rx="14" fill="#62a0ea" fill-opacity="0.13" stroke="#62a0ea" stroke-opacity="0.44"/>
    <text x="1141" y="337" class="pill" text-anchor="middle" fill="#9bc8f7">HOST ADAPTERS</text>
    <text x="1070" y="390" class="crate mono" fill="#f8fafc">reprise-</text>
    <text x="1070" y="421" class="crate mono" fill="#f8fafc">platform-linux</text>
    <text x="1070" y="464" class="card-title" fill="#dbeafe">Implements host work</text>
    <text x="1070" y="498" class="body" fill="#b8c6d8">GStreamer playback + analysis</text>
    <text x="1070" y="528" class="body" fill="#b8c6d8">MPRIS / D-Bus · MTP · Trash</text>
    <rect x="1070" y="550" width="266" height="32" rx="9" fill="#0d1521"/>
    <text x="1203" y="571" class="flow" text-anchor="middle" fill="#74f0d0">IMPLEMENTS CORE CONTRACTS</text>

    <!-- Data and implementation relationships -->
    <path d="M398 405H438" fill="none" stroke="#62a0ea" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M458 505H418" fill="none" stroke="#57e0bf" stroke-width="3" marker-end="url(#arrow-green)"/>
    <path d="M1042 500H1002" fill="none" stroke="#57e0bf" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-green)"/>

    <!-- Enforced purity -->
    <g filter="url(#shadow)">
      <rect x="76" y="696" width="1288" height="126" rx="20" fill="#151d2a" stroke="#35445a"/>
    </g>
    <text x="108" y="737" class="eyebrow" fill="#d8a35d">FORBIDDEN IN reprise-core</text>
    <g class="mono">
      <rect x="108" y="758" width="104" height="36" rx="10" fill="#0d1521"/>
      <text x="160" y="782" class="small" text-anchor="middle" fill="#cbd5e1">GTK</text>
      <rect x="224" y="758" width="136" height="36" rx="10" fill="#0d1521"/>
      <text x="292" y="782" class="small" text-anchor="middle" fill="#cbd5e1">libadwaita</text>
      <rect x="372" y="758" width="138" height="36" rx="10" fill="#0d1521"/>
      <text x="441" y="782" class="small" text-anchor="middle" fill="#cbd5e1">GStreamer</text>
      <rect x="522" y="758" width="104" height="36" rx="10" fill="#0d1521"/>
      <text x="574" y="782" class="small" text-anchor="middle" fill="#cbd5e1">zbus</text>
    </g>
    <path d="M704 756l12 12 23-28" fill="none" stroke="#74f0d0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="764" y="770" class="card-title" fill="#f8fafc">Mechanically enforced</text>
    <text x="764" y="797" class="body mono" fill="#aebdd0">check-architecture.sh + cargo tree</text>

    <text x="76" y="861" class="small" fill="#94a3b8">Result: domain tests run without GTK or host services; native edges can change without moving product rules.</text>
  </g>
</svg>
